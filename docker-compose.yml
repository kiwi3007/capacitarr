services:
  capacitarr:
    build: .
    container_name: capacitarr
    ports:
      - "2187:2187"
    environment:
      - PUID=1001
      - PGID=1001
      - DEBUG=true
    volumes:
      - capacitarr-config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:2187/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Security hardening — drop all Linux capabilities then add back only the 4
    # needed by the PUID/PGID entrypoint. The Go binary itself needs zero caps.
    #   CHOWN         — chown /config to PUID:PGID
    #   DAC_OVERRIDE  — adduser/addgroup writes to /etc/passwd, /etc/group
    #   SETUID/SETGID — su-exec drops from root to PUID:PGID
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    restart: unless-stopped

volumes:
  capacitarr-config:
