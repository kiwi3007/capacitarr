# Capacitarr CI Pipeline (GitHub Actions)
#
# Runs on every push to main and every pull request targeting main.
# Mirrors the local `make ci` checks using the same tool versions.
#
# Stages (parallelism):
#   lint + test     — all four jobs run in parallel
#   build + security — run in parallel after lint+test pass

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────

  lint-go:
    name: "Lint: Go (golangci-lint v2.11.4)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Create go:embed placeholder
        run: mkdir -p backend/frontend/dist && touch backend/frontend/dist/.gitkeep
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: backend

  lint-frontend:
    name: "Lint: Frontend (ESLint + Prettier + TypeScript)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Lint
        run: cd frontend && pnpm lint
      - name: Format check
        run: cd frontend && pnpm format:check
      - name: Type check
        run: cd frontend && pnpm typecheck

  # ── Test ──────────────────────────────────────────────────────────────────────

  test-go:
    name: "Test: Go"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Create go:embed placeholder
        run: mkdir -p backend/frontend/dist && touch backend/frontend/dist/.gitkeep
      - name: Run tests
        run: cd backend && go test -v ./... -count=1

  test-frontend:
    name: "Test: Frontend (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Run tests
        run: cd frontend && pnpm test

  # ── Build ─────────────────────────────────────────────────────────────────────

  build-docker:
    name: "Build: Docker (multi-arch)"
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend, test-go, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build multi-arch Docker image (no push)
        run: >
          docker buildx build
          --platform linux/amd64,linux/arm64
          --provenance=false
          --output=type=cacheonly
          .

  # ── Security ──────────────────────────────────────────────────────────────────

  security-govulncheck:
    name: "Security: govulncheck"
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend, test-go, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Create go:embed placeholder
        run: mkdir -p backend/frontend/dist && touch backend/frontend/dist/.gitkeep
      - name: Run govulncheck
        run: cd backend && govulncheck ./...

  security-pnpm-audit:
    name: "Security: pnpm audit"
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend, test-go, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: cd frontend && pnpm audit

  security-trivy:
    name: "Security: Trivy filesystem scan"
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend, test-go, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: backend/
          exit-code: "1"
          severity: HIGH,CRITICAL
          scanners: vuln
          version: "v0.69.3"
      - name: Trivy filesystem scan (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: frontend/
          exit-code: "1"
          severity: HIGH,CRITICAL
          scanners: vuln
          version: "v0.69.3"

  security-trivy-image:
    name: "Security: Trivy image scan"
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend, test-go, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image for scanning
        run: docker build -t capacitarr:ci-scan .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: capacitarr:ci-scan
          exit-code: "1"
          severity: HIGH,CRITICAL
          scanners: vuln
          version: "v0.69.3"

  security-gitleaks:
    name: "Security: Gitleaks"
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend, test-go, test-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  security-semgrep:
    name: "Security: Semgrep SAST"
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend, test-go, test-frontend]
    container: semgrep/semgrep:1.155.0
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config=auto --error .
