openapi: 3.1.0
info:
  title: Capacitarr API
  version: 2.0.0
  description: |
    Capacitarr is a capacity management tool for media servers. It monitors disk
    usage across Sonarr, Radarr, Lidarr, Readarr, Plex, Jellyfin, Emby, Tautulli,
    and Seerr integrations, scores media items for potential cleanup based on
    configurable weights and rules, and can automatically (or via approval) free
    disk space when thresholds are breached.

    ## Authentication

    Most endpoints require authentication via one of:
    - **JWT cookie** (`jwt`) — set automatically on login
    - **Bearer token** — `Authorization: Bearer <token>` header
    - **API key** — `X-Api-Key: <key>` header

    The `/health`, `/version`, and `/auth/login` endpoints are public.
  license:
    name: PolyForm Noncommercial 1.0.0
    url: https://polyformproject.org/licenses/noncommercial/1.0.0/

servers:
  - url: http://localhost:2187/api/v1
    description: Local development server

security:
  - cookieAuth: []
  - bearerAuth: []
  - apiKey: []

tags:
  - name: Health
    description: Health and version checks (public)
  - name: Auth
    description: Authentication, password/username management, API key management
  - name: Metrics
    description: Capacity history and worker metrics
  - name: Dashboard
    description: Aggregated dashboard and lifetime statistics
  - name: Disk Groups
    description: Disk group listing and threshold configuration
  - name: Engine
    description: Trigger engine evaluation cycles
  - name: Integrations
    description: CRUD and connection testing for service integrations
  - name: Rules
    description: Protection/targeting rules and rule field metadata
  - name: Preferences
    description: Global preference management (execution mode, tiebreaker, etc.)
  - name: Factor Weights
    description: Scoring factor weight registry (read + update)
  - name: Preview
    description: Score preview with evaluated items and disk context
  - name: Audit
    description: Audit log listing, activity summary, and grouped view
  - name: Approval Queue
    description: Approval queue management (approve, reject, snooze, clear)
  - name: Deletion Queue
    description: Deletion queue management (list, cancel, snooze, clear, grace period)
  - name: Libraries
    description: Library entity CRUD with per-library threshold management
  - name: Analytics
    description: Watch intelligence — dead content, stale content, capacity forecast
  - name: Migration
    description: V1-to-v2 database migration status, execute, and dismiss
  - name: Activity
    description: Recent activity event feed
  - name: Notifications
    description: Notification channel CRUD and testing
  - name: Events
    description: Server-Sent Events (SSE) real-time stream
  - name: Settings Backup
    description: Settings export/import with section-level granularity
  - name: Version Check
    description: Update check with cache
  - name: Data
    description: Data reset / clear operations

paths:
  # ===========================================================================
  # Health & Version
  # ===========================================================================
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      description: Returns "OK" if the server is running. No authentication required.
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /version:
    get:
      operationId: getVersion
      tags: [Health]
      summary: Get application version
      description: Returns the build version, git commit hash, and build date. No authentication required.
      security: []
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"

  # ===========================================================================
  # Auth
  # ===========================================================================
  /auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Log in
      description: |
        Authenticate with username and password. Returns a JWT token in both the
        response body and as an HttpOnly `jwt` cookie. On first call with no
        existing users, the provided credentials bootstrap the initial admin user.
        Rate-limited to 10 attempts per IP per 15-minute window.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: HttpOnly JWT cookie and `authenticated=true` indicator cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/password:
    put:
      operationId: changePassword
      tags: [Auth]
      summary: Change password
      description: Change the current user's password. Requires the current password for verification. New password must be at least 8 characters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/username:
    put:
      operationId: changeUsername
      tags: [Auth]
      summary: Change username
      description: Change the current user's username. Requires the current password for verification. New username must be at least 3 characters and not already taken.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeUsernameRequest"
      responses:
        "200":
          description: Username changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/apikey:
    get:
      operationId: getApiKeyStatus
      tags: [Auth]
      summary: Check API key status
      description: Returns whether the current user has an API key configured. Never returns the actual key.
      responses:
        "200":
          description: API key status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: generateApiKey
      tags: [Auth]
      summary: Generate a new API key
      description: |
        Generates a new 256-bit random API key. The plaintext key is returned
        **once** in the response and is never stored — only a SHA-256 hash is
        persisted. Any previously existing key is replaced.
      responses:
        "200":
          description: New API key generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Metrics
  # ===========================================================================
  /metrics/history:
    get:
      operationId: getMetricsHistory
      tags: [Metrics]
      summary: Get capacity history
      description: |
        Returns historical capacity data points for charting. Results are ordered
        by timestamp ascending and limited to 1000 records.
      parameters:
        - name: resolution
          in: query
          description: Data resolution granularity
          schema:
            type: string
            enum: [raw, hourly, daily, weekly]
            default: raw
        - name: disk_group_id
          in: query
          description: Filter by disk group ID
          schema:
            type: integer
        - name: since
          in: query
          description: Time range filter
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d"]
          example: "24h"
      responses:
        "200":
          description: Metrics history data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /worker/stats:
    get:
      operationId: getWorkerStats
      tags: [Metrics]
      summary: Get worker stats
      description: Returns the current state of the backend polling/deletion worker, including per-run and cumulative statistics.
      responses:
        "200":
          description: Worker metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Dashboard & Lifetime Stats
  # ===========================================================================
  /dashboard-stats:
    get:
      operationId: getDashboardStats
      tags: [Dashboard]
      summary: Get aggregated dashboard statistics
      description: |
        Returns combined statistics for the dashboard: lifetime totals (bytes
        reclaimed, items removed, engine runs), current protected count, and
        7-day library growth rate.
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /lifetime-stats:
    get:
      operationId: getLifetimeStats
      tags: [Dashboard]
      summary: Get cumulative lifetime statistics
      description: |
        Returns the cumulative lifetime counters. These persist across container
        restarts and are **not** cleared by the data reset action.
      responses:
        "200":
          description: Lifetime statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifetimeStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Disk Groups
  # ===========================================================================
  /disk-groups:
    get:
      operationId: listDiskGroups
      tags: [Disk Groups]
      summary: List all disk groups
      description: Returns all discovered disk groups (mount points) with their current capacity and threshold settings.
      responses:
        "200":
          description: List of disk groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiskGroup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /disk-groups/{id}:
    put:
      operationId: updateDiskGroup
      tags: [Disk Groups]
      summary: Update disk group thresholds
      description: |
        Update the threshold and target percentages for a disk group.
        Both values must be between 1 and 99, and threshold must be greater
        than target.
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiskGroupThresholdUpdate"
      responses:
        "200":
          description: Updated disk group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskGroup"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Disk group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Engine
  # ===========================================================================
  /engine/run:
    post:
      operationId: triggerEngineRun
      tags: [Engine]
      summary: Trigger an engine evaluation
      description: |
        Triggers an immediate evaluation cycle. If a run is already pending
        (queued but not started), returns `"already_pending"` instead.
      responses:
        "200":
          description: Engine run triggered or already pending
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [triggered, already_pending]
                example:
                  status: triggered
        "401":
          $ref: "#/components/responses/Unauthorized"

  /engine/history:
    get:
      operationId: getEngineHistory
      tags: [Engine]
      summary: Get engine run history
      description: |
        Returns historical engine run statistics within the specified time range.
        Each point represents one engine evaluation cycle with metrics for
        evaluated, flagged, deleted counts, freed bytes, and duration.
      parameters:
        - name: range
          in: query
          description: |
            Time range for history. Supports shorthand like `1h`, `6h`, `24h`,
            `7d`, `30d`.
          schema:
            type: string
            default: "7d"
            example: "7d"
      responses:
        "200":
          description: Array of engine history data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngineHistoryPoint"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Integrations
  # ===========================================================================
  /integrations:
    get:
      operationId: listIntegrations
      tags: [Integrations]
      summary: List all integrations
      description: Returns all configured integrations. API keys are masked in the response (first 4 + last 4 characters shown).
      responses:
        "200":
          description: List of integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createIntegration
      tags: [Integrations]
      summary: Create a new integration
      description: |
        Creates a new integration configuration. The `type`, `name`, `url`, and
        `apiKey` fields are required. The URL must use HTTP or HTTPS scheme.
        Valid types: `plex`, `sonarr`, `radarr`, `lidarr`, `readarr`, `tautulli`,
        `seerr`, `jellyfin`, `emby`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationConfigCreate"
      responses:
        "201":
          description: Integration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /integrations/{id}:
    get:
      operationId: getIntegration
      tags: [Integrations]
      summary: Get a single integration
      description: Returns a single integration by ID. API key is masked.
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Integration details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateIntegration
      tags: [Integrations]
      summary: Update an integration
      description: |
        Updates an existing integration. Only provided fields are updated.
        If the `apiKey` field contains a masked value (with `...`), it is
        ignored and the existing key is preserved.
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationConfigUpdate"
      responses:
        "200":
          description: Updated integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: deleteIntegration
      tags: [Integrations]
      summary: Delete an integration
      description: Permanently deletes an integration configuration.
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Integration deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /integrations/test:
    post:
      operationId: testIntegrationConnection
      tags: [Integrations]
      summary: Test integration connection
      description: |
        Tests connectivity to a service using the provided credentials.
        Returns `success: true` on success, or `success: false` with an
        error message on failure. Note: the HTTP status is always 200 —
        the `success` field indicates the test result.
        Optionally pass `integrationId` to invalidate the rule value cache
        for that integration on successful test.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTestRequest"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /integrations/sync:
    post:
      operationId: syncIntegrations
      tags: [Integrations]
      summary: Sync all integrations
      description: |
        Triggers a manual synchronization of all enabled integrations.
        Tests each connection, fetches disk space and media item counts,
        and updates disk groups. Invalidates all rule value caches.
      responses:
        "200":
          description: Sync results for each integration
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Preferences
  # ===========================================================================
  /preferences:
    get:
      operationId: getPreferences
      tags: [Preferences]
      summary: Get preferences
      description: Returns the global preference singleton. If no preferences exist yet, returns defaults.
      responses:
        "200":
          description: Current preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceSet"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      operationId: updatePreferences
      tags: [Preferences]
      summary: Update preferences
      description: |
        Updates the global preferences. All weight values must be between 0 and
        10. The log level is applied immediately. If `pollIntervalSeconds` is
        less than 30, it defaults to 300.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferenceSet"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Rule Fields & Rule Values
  # ===========================================================================
  /rule-fields:
    get:
      operationId: getRuleFields
      tags: [Rules]
      summary: Get available rule fields
      description: |
        Returns the list of available fields for building protection/targeting
        rules. Fields are dynamic based on which integrations are enabled.
        For example, Sonarr-specific fields (season count, episode count) only
        appear when Sonarr is enabled.
      parameters:
        - name: service_type
          in: query
          description: Filter fields for a specific integration type
          schema:
            type: string
            enum: [sonarr, radarr, lidarr, readarr]
      responses:
        "200":
          description: List of rule fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleField"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rule-values:
    get:
      operationId: getRuleValues
      tags: [Rules]
      summary: Get autocomplete values for a rule field
      description: |
        Returns value options for a given rule field and integration. Depending
        on the field, returns either a closed set of options, a combobox with
        suggestions, or free-form input metadata. Results are cached for 5 minutes.
      parameters:
        - name: integration_id
          in: query
          required: true
          description: ID of the integration to fetch values from
          schema:
            type: integer
        - name: action
          in: query
          required: true
          description: |
            The rule field name to get values for (e.g., `quality`, `tag`,
            `genre`, `language`, `title`, `rating`, `sizebytes`, `timeinlibrary`,
            `year`, `monitored`, `requested`, `type`, `seriesstatus`,
            `seasoncount`, `episodecount`, `playcount`, `requestcount`)
          schema:
            type: string
      responses:
        "200":
          description: |
            Rule value options. Shape varies by field type:
            - **closed**: `{ type: "closed", options: NameValue[] }`
            - **combobox**: `{ type: "combobox", suggestions: NameValue[] }`
            - **free**: `{ type: "free", inputType: string, placeholder: string, suffix: string }`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleValueResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Custom Rules
  # ===========================================================================
  /custom-rules:
    get:
      operationId: listCustomRules
      tags: [Rules]
      summary: List all protection/targeting rules
      description: Returns all configured protection and targeting rules.
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomRule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createCustomRule
      tags: [Rules]
      summary: Create a protection/targeting rule
      description: |
        Creates a new rule. The `field`, `operator`, and `value` fields are
        always required. Additionally, either `effect` must be provided, or
        both legacy `type` and `intensity` fields (which are auto-mapped to
        the new effect system).

        Valid effects: `always_keep`, `prefer_keep`, `lean_keep`,
        `lean_remove`, `prefer_remove`, `always_remove`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomRuleCreate"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /custom-rules/{id}:
    put:
      operationId: updateCustomRule
      tags: [Rules]
      summary: Update a protection/targeting rule
      description: Updates an existing rule's field, operator, value, effect, enabled status, or integration assignment.
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomRuleCreate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteCustomRule
      tags: [Rules]
      summary: Delete a protection/targeting rule
      description: Permanently deletes a rule.
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "204":
          description: Rule deleted (no content)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /settings/export:
    get:
      operationId: exportSettings
      tags: [Settings]
      summary: Export application settings as portable JSON
      description: |
        Returns application settings in a portable JSON format suitable for
        backup or migration. Supports section-level granularity via the
        `sections` query parameter. Sensitive credentials (API keys, webhook
        URLs) are stripped from the export. Sets a Content-Disposition header
        suggesting a dated filename.
      parameters:
        - name: sections
          in: query
          description: |
            Comma-separated list of sections to export. If omitted, all
            sections are included. Valid values: preferences, rules,
            integrations, diskGroups, notifications.
          schema:
            type: string
            example: "preferences,rules"
      responses:
        "200":
          description: Settings export envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsExportEnvelope"
          headers:
            Content-Disposition:
              description: Suggested download filename
              schema:
                type: string
                example: 'attachment; filename="capacitarr-settings-2026-03-06.json"'
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /settings/import:
    post:
      operationId: importSettings
      tags: [Settings]
      summary: Import application settings from a portable export
      description: |
        Imports settings from a previously exported envelope. Supports
        section-level granularity — you can import a subset of the
        available sections.

        Two import modes are available:
        - **merge** (default): Upserts matching items, creates new ones,
          leaves existing unmatched items untouched.
        - **sync**: Upserts matching items, creates new ones, and deletes
          existing items NOT in the import file — making the database
          match the file exactly for the selected sections. A pre-import
          snapshot is included in the response for safety.

        Sensitive credentials (API keys, webhook URLs) are not included
        in exports and must be re-entered manually after import.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsImportRequest"
      responses:
        "200":
          description: Import completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsImportResponse"
        "400":
          description: Validation failed (invalid version, malformed payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /settings/import/preview:
    post:
      operationId: previewImportSettings
      tags: [Settings]
      summary: Preview settings import without applying changes
      description: |
        Analyzes the export file against the current database and reports
        how each section would be affected, without committing any changes.
        Returns per-section diff with create/update/unchanged status,
        field-level changes, rule resolution details, and sync-mode
        deletion previews. This endpoint powers the "Review Changes"
        step in the UI import wizard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsImportRequest"
      responses:
        "200":
          description: Import preview with resolution details
          content:
            application/json:
              schema:
                type: object
                description: Preview result with rule conflict analysis
        "400":
          description: Validation failed (invalid version, malformed payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /settings/import/commit:
    post:
      operationId: commitImportSettings
      tags: [Settings]
      summary: Commit settings import with user-provided overrides
      description: |
        Executes the import using user-provided overrides for rule
        integration assignments from the preview step. This is the
        final step of the two-phase import flow: preview → commit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload, sections]
              properties:
                payload:
                  $ref: "#/components/schemas/SettingsExportEnvelope"
                sections:
                  type: object
                  description: Which sections to import (all default to false)
                  properties:
                    preferences:
                      type: boolean
                    rules:
                      type: boolean
                    integrations:
                      type: boolean
                    diskGroups:
                      type: boolean
                    notifications:
                      type: boolean
                overrides:
                  type: array
                  description: Rule integration overrides from the preview step
                  items:
                    type: object
                    properties:
                      ruleIndex:
                        type: integer
                        description: Index of the rule in the export payload
                      integrationId:
                        type: integer
                        description: Target integration ID to assign the rule to
      responses:
        "200":
          description: Import committed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsImportResponse"
        "400":
          description: Validation failed (invalid version, malformed payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Preview
  # ===========================================================================
  /preview:
    get:
      operationId: getPreview
      tags: [Preview]
      summary: Preview scoring
      description: |
        Fetches all media items from enabled *arr integrations, evaluates them
        against the current preferences and rules, and returns the scored list
        along with disk context information. Items are sorted by score
        descending (highest deletion priority first) with the configured
        tiebreaker method applied.
      responses:
        "200":
          description: Preview of scored items with disk context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Audit
  # ===========================================================================
  # ===========================================================================
  # Audit Log (history — append-only deletions and dry-runs)
  # ===========================================================================
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [Audit Log]
      summary: List audit log entries
      description: |
        Returns paginated audit log entries (permanent history of deletions and dry-runs).
        The default sort is by `created_at` descending (newest first).
      parameters:
        - name: limit
          in: query
          description: Maximum number of records to return (max 1000)
          schema:
            type: integer
            default: 50
            maximum: 1000
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter by media name (substring match)
          schema:
            type: string
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
            enum: [deleted, dry_run, dry_delete]
        - name: sort_by
          in: query
          description: Column to sort by
          schema:
            type: string
            enum: [created_at, media_name, size_bytes, action]
            default: created_at
        - name: sort_dir
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated audit log response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /audit-log/recent:
    get:
      operationId: getAuditLogRecent
      tags: [Audit Log]
      summary: Get recent audit log entries
      description: Returns the most recent audit log entries for the dashboard mini-feed.
      parameters:
        - name: limit
          in: query
          description: Maximum number of records to return
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /audit-log/grouped:
    get:
      operationId: getAuditLogGrouped
      tags: [Audit Log]
      summary: Get grouped audit log entries
      description: |
        Returns audit log entries grouped by TV show title for season/episode entries.
        Non-TV entries are returned as standalone items. Useful for a tree-style
        audit view.
      parameters:
        - name: limit
          in: query
          description: Maximum number of raw records to fetch before grouping (max 2000)
          schema:
            type: integer
            default: 200
            maximum: 2000
      responses:
        "200":
          description: Grouped audit log results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupedAuditResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # Approval Queue (active items in the approval workflow)
  # ===========================================================================
  /approval-queue:
    get:
      operationId: listApprovalQueue
      tags: [Approval Queue]
      summary: List approval queue items
      description: |
        Returns items in the approval queue. Optionally filter by status.
      parameters:
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: Approval queue items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalQueueItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /approval-queue/{id}/approve:
    post:
      operationId: approveQueueItem
      tags: [Approval Queue]
      summary: Approve a queued item for deletion
      description: |
        Approves a pending approval queue item, moving it to "approved"
        status and queuing the associated media item for background deletion.

        Requires that deletions are enabled in settings. If deletions are
        disabled, the request is rejected with a `409 Conflict` response.
      parameters:
        - name: id
          in: path
          required: true
          description: Approval queue item ID
          schema:
            type: integer
      responses:
        "200":
          description: Item approved and queued for deletion
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "approved"
        "400":
          description: Bad request — item is not in pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict — deletions are disabled in settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /approval-queue/{id}/reject:
    post:
      operationId: rejectQueueItem
      tags: [Approval Queue]
      summary: Reject (snooze) a queued item
      description: |
        Rejects a pending approval queue item, setting its status to "rejected"
        and applying a snooze period. The item will not appear in the queue
        until the snooze expires or it is manually unsnoozed.
      parameters:
        - name: id
          in: path
          required: true
          description: Approval queue item ID
          schema:
            type: integer
      responses:
        "200":
          description: Item rejected and snoozed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "rejected"
        "400":
          description: Bad request — item is not in pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /approval-queue/{id}/unsnooze:
    post:
      operationId: unsnoozeQueueItem
      tags: [Approval Queue]
      summary: Unsnooze a rejected item
      description: |
        Returns a rejected (snoozed) approval queue item to pending status,
        clearing the snooze period. The item will reappear in the queue.
      parameters:
        - name: id
          in: path
          required: true
          description: Approval queue item ID
          schema:
            type: integer
      responses:
        "200":
          description: Item unsnoozed and returned to pending
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "unsnoozed"
        "400":
          description: Bad request — item is not in rejected status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /delete:
    post:
      operationId: manualDelete
      tags: [Deletion Queue]
      summary: Manually queue media items for deletion
      description: |
        Queues one or more media items for deletion, bypassing the normal engine
        evaluation. In auto/dry-run mode, items are queued to the deletion
        service immediately. In approval mode, items are upserted as pending
        approval queue entries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [mediaName, mediaType, integrationId, externalId]
                properties:
                  mediaName:
                    type: string
                    description: Display name of the media item
                    example: "Firefly"
                  mediaType:
                    type: string
                    description: Media type (movie, show, season, etc.)
                    example: "show"
                  integrationId:
                    type: integer
                    description: ID of the integration that owns this item
                    example: 1
                  externalId:
                    type: string
                    description: External ID in the integration
                    example: "42"
                  sizeBytes:
                    type: integer
                    description: Item size in bytes
                    example: 5069636198
                  reason:
                    type: string
                    description: Reason for force deletion
                    example: "Manual cleanup"
                  scoreDetails:
                    type: string
                    description: JSON-encoded score breakdown
                  posterUrl:
                    type: string
                    description: URL to the item's poster image
      responses:
        "200":
          description: Items queued for deletion
          content:
            application/json:
              schema:
                type: object
                properties:
                  queued:
                    type: integer
                    description: Number of items successfully queued
                    example: 3
                  total:
                    type: integer
                    description: Total items in the request
                    example: 3
        "400":
          description: Invalid request body or no items provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Deletions disabled or in dry-run mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ===========================================================================
  # SSE (Server-Sent Events)
  # ===========================================================================
  /events:
    get:
      operationId: subscribeEvents
      tags: [Events]
      summary: Subscribe to real-time events via SSE
      description: |
        Opens a long-lived Server-Sent Events (SSE) connection that streams
        typed events in real-time. Events include engine runs, deletions,
        config changes, approval actions, and more (44 event types total).

        Supports reconnection replay via the `Last-Event-ID` header.
        A keepalive comment is sent every 30 seconds to prevent proxy timeouts.
      parameters:
        - name: Last-Event-ID
          in: header
          description: Resume from this event ID on reconnection. Events after this ID will be replayed from a ring buffer (up to 100 events).
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Each event follows the SSE format:
                  ```
                  id: <event-id>
                  event: <event-type>
                  data: <json-payload>
                  ```
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Data
  # ===========================================================================
  /data/reset:
    delete:
      operationId: resetData
      tags: [Data]
      summary: Reset all scraped data
      description: |
        Clears all audit logs, library history, engine run stats, and disk
        groups. Resets transient fields on integrations (media size, count,
        last sync, last error). **Lifetime stats are NOT cleared.** This
        action is irreversible.
      responses:
        "200":
          description: Data reset summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [Auth]
      summary: Check authentication initialization status
      description: Returns whether the server has at least one user configured. Used by the frontend for first-login UX detection.
      security: []
      responses:
        "200":
          description: Auth initialization status
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized:
                    type: boolean
                    description: True if at least one user exists

  /activity/recent:
    get:
      operationId: getRecentActivity
      tags: [Activity]
      summary: List recent activity events
      description: Returns the most recent system activity events for the dashboard feed. Activity events have a fixed 7-day retention.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
            maximum: 100
      responses:
        "200":
          description: List of recent activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/channels:
    get:
      operationId: listNotificationChannels
      tags: [Notifications]
      summary: List all notification channels
      responses:
        "200":
          description: List of notification channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationChannel"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createNotificationChannel
      tags: [Notifications]
      summary: Create a notification channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationChannelInput"
      responses:
        "201":
          description: Created notification channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/channels/{id}:
    put:
      operationId: updateNotificationChannel
      tags: [Notifications]
      summary: Update a notification channel
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationChannelInput"
      responses:
        "200":
          description: Updated notification channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteNotificationChannel
      tags: [Notifications]
      summary: Delete a notification channel
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Channel deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /notifications/channels/{id}/test:
    post:
      operationId: testNotificationChannel
      tags: [Notifications]
      summary: Send a test notification
      description: Sends a test notification to the specified channel to verify webhook connectivity.
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Test notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Test notification delivery failed

  /version/check:
    get:
      operationId: checkVersion
      tags: [Version]
      summary: Check for updates (cached)
      description: Returns cached update check results. Checks the GitLab releases API with a 6-hour cache TTL.
      responses:
        "200":
          description: Version check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionCheckResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: forceCheckVersion
      tags: [Version]
      summary: Force check for updates (bypass cache)
      description: Forces a fresh check against the GitLab releases API, bypassing the cache.
      responses:
        "200":
          description: Version check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionCheckResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /custom-rules/reorder:
    put:
      operationId: reorderCustomRules
      tags: [Rules]
      summary: Reorder custom rules
      description: Sets the sort order for all custom rules based on the provided ID array.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items:
                    type: integer
                  description: Ordered array of rule IDs
      responses:
        "200":
          description: Rules reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
         "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Custom Rules — Impact & Context
  # ===========================================================================
  /custom-rules/{id}/impact:
    get:
      operationId: getRuleImpact
      tags: [Rules]
      summary: Get rule impact analysis
      description: Returns the impact analysis for a specific custom rule.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rule impact data
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /custom-rules/{id}/context:
    get:
      operationId: getRuleContext
      tags: [Rules]
      summary: Get rule context
      description: Returns contextual information for a specific custom rule.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rule context data
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Approval Queue — Delete & Clear
  # ===========================================================================
  /approval-queue/{id}:
    delete:
      operationId: deleteApprovalQueueItem
      tags: [Approval Queue]
      summary: Remove an item from the approval queue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /approval-queue/clear:
    post:
      operationId: clearApprovalQueue
      tags: [Approval Queue]
      summary: Clear all approval queue items
      responses:
        "200":
          description: Queue cleared
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Deletion Queue
  # ===========================================================================
  /deletion-queue:
    get:
      operationId: listDeletionQueue
      tags: [Deletion Queue]
      summary: List items in the deletion queue
      responses:
        "200":
          description: List of items pending deletion
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: cancelDeletion
      tags: [Deletion Queue]
      summary: Cancel a pending deletion
      description: Remove a specific item from the deletion queue and snooze it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaName, mediaType]
              properties:
                mediaName:
                  type: string
                mediaType:
                  type: string
      responses:
        "200":
          description: Deletion cancelled and item snoozed
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deletion-queue/snooze:
    post:
      operationId: snoozeDeletion
      tags: [Deletion Queue]
      summary: Snooze a deletion queue item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaName, mediaType]
              properties:
                mediaName:
                  type: string
                mediaType:
                  type: string
      responses:
        "200":
          description: Item snoozed
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deletion-queue/clear:
    post:
      operationId: clearDeletionQueue
      tags: [Deletion Queue]
      summary: Clear all pending deletions
      responses:
        "200":
          description: Queue cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deletion-queue/grace-period:
    get:
      operationId: getGracePeriodState
      tags: [Deletion Queue]
      summary: Get deletion grace period state
      responses:
        "200":
          description: Grace period state
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  remainingSeconds:
                    type: number
                  queueSize:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Libraries
  # ===========================================================================
  /libraries:
    get:
      operationId: listLibraries
      tags: [Libraries]
      summary: List all libraries
      responses:
        "200":
          description: List of libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLibrary
      tags: [Libraries]
      summary: Create a new library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /libraries/{id}:
    get:
      operationId: getLibrary
      tags: [Libraries]
      summary: Get a library by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Library details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateLibrary
      tags: [Libraries]
      summary: Update a library
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreate"
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteLibrary
      tags: [Libraries]
      summary: Delete a library
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Library deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Analytics
  # ===========================================================================
  /analytics/dead-content:
    get:
      operationId: getDeadContent
      tags: [Analytics]
      summary: Get dead content (never watched)
      description: Returns media items that have never been watched since being added to the library.
      parameters:
        - name: minDays
          in: query
          schema:
            type: integer
            default: 90
          description: Minimum days in library
        - name: disk_group_id
          in: query
          schema:
            type: integer
          description: Filter by disk group
      responses:
        "200":
          description: List of dead content items
        "401":
          $ref: "#/components/responses/Unauthorized"

  /analytics/stale-content:
    get:
      operationId: getStaleContent
      tags: [Analytics]
      summary: Get stale content (not watched recently)
      description: Returns media items that haven't been watched in a long time.
      parameters:
        - name: staleDays
          in: query
          schema:
            type: integer
            default: 180
          description: Days since last watch
        - name: disk_group_id
          in: query
          schema:
            type: integer
          description: Filter by disk group
      responses:
        "200":
          description: List of stale content items
        "401":
          $ref: "#/components/responses/Unauthorized"

  /analytics/forecast:
    get:
      operationId: getCapacityForecast
      tags: [Analytics]
      summary: Get capacity forecast
      description: Returns capacity forecast based on linear regression of recent usage history.
      parameters:
        - name: disk_group_id
          in: query
          schema:
            type: integer
          description: Filter by disk group (defaults to most degraded)
      responses:
        "200":
          description: Capacity forecast data
          content:
            application/json:
              schema:
                type: object
                properties:
                  daysUntilThreshold:
                    type: integer
                    description: Estimated days until threshold breach (-1 if no data)
                  daysUntilFull:
                    type: integer
                    description: Estimated days until disk is full (-1 if no data)
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Scoring Factor Weights
  # ===========================================================================
  /scoring-factor-weights:
    get:
      operationId: listFactorWeights
      tags: [Factor Weights]
      summary: List all scoring factor weights
      description: Returns all scoring factors with current weights and metadata from the engine's factor registry.
      responses:
        "200":
          description: List of factor weights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoringFactorWeight"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateFactorWeights
      tags: [Factor Weights]
      summary: Update scoring factor weights
      description: Pass a map of factor keys to weight values (0–10 scale).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: integer
                minimum: 0
                maximum: 10
              example:
                watch_history: 10
                file_size: 6
                rating: 5
      responses:
        "200":
          description: Weights updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoringFactorWeight"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Migration
  # ===========================================================================
  /migration/status:
    get:
      operationId: getMigrationStatus
      tags: [Migration]
      summary: Check migration status (public)
      description: Check whether a v1 database migration is available. This endpoint is public (no auth required).
      security: []
      responses:
        "200":
          description: Migration status

  /migration/execute:
    post:
      operationId: executeMigration
      tags: [Migration]
      summary: Execute v1-to-v2 migration
      responses:
        "200":
          description: Migration completed
        "401":
          $ref: "#/components/responses/Unauthorized"

  /migration/dismiss:
    post:
      operationId: dismissMigration
      tags: [Migration]
      summary: Dismiss migration prompt
      responses:
        "200":
          description: Migration dismissed
        "401":
          $ref: "#/components/responses/Unauthorized"

# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API key generated via `POST /auth/apikey`
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from login response
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt
      description: HttpOnly JWT cookie set on login

  # ---------------------------------------------------------------------------
  # Reusable Parameters
  # ---------------------------------------------------------------------------
  parameters:
    PathId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Bad request — invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # ---- Generic ----
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required: [error]
      example:
        error: "Invalid request body"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
      example:
        message: "Password changed successfully"

    # ---- Health / Version ----
    VersionInfo:
      type: object
      properties:
        version:
          type: string
          example: "1.2.0"
        commit:
          type: string
          example: "abc1234"
        buildDate:
          type: string
          example: "2026-03-01T12:00:00Z"
      required: [version, commit, buildDate]

    # ---- Auth ----
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: mypassword
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: success
        token:
          type: string
          description: JWT token (also set as HttpOnly cookie)
      required: [message, token]

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8
      required: [currentPassword, newPassword]

    ChangeUsernameRequest:
      type: object
      properties:
        newUsername:
          type: string
          minLength: 3
        currentPassword:
          type: string
          format: password
      required: [newUsername, currentPassword]

    ApiKeyStatusResponse:
      type: object
      properties:
        has_key:
          type: boolean
          description: Whether the user has an API key configured
      required: [has_key]
      example:
        has_key: true

    ApiKeyResponse:
      type: object
      properties:
        api_key:
          type: string
          description: |
            The plaintext API key. This is shown **once** and never stored.
            Save it securely.
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
      required: [api_key]

    # ---- Disk Group ----
    DiskGroup:
      type: object
      properties:
        id:
          type: integer
          example: 1
        mountPath:
          type: string
          example: "/media"
        totalBytes:
          type: integer
          format: int64
          example: 1099511627776
        usedBytes:
          type: integer
          format: int64
          example: 879609302221
        thresholdPct:
          type: number
          format: double
          description: Cleanup triggers when usage exceeds this percentage
          example: 85.0
        targetPct:
          type: number
          format: double
          description: Cleanup frees space down to this percentage
          example: 75.0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, mountPath, totalBytes, usedBytes, thresholdPct, targetPct]

    DiskGroupThresholdUpdate:
      type: object
      properties:
        thresholdPct:
          type: number
          format: double
          minimum: 1
          maximum: 99
          description: Cleanup triggers when usage exceeds this percentage
          example: 85.0
        targetPct:
          type: number
          format: double
          minimum: 1
          maximum: 99
          description: Cleanup frees space down to this percentage
          example: 75.0
      required: [thresholdPct, targetPct]

    # ---- Library ----
    Library:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "TV Shows"
        diskGroupId:
          type: ["integer", "null"]
          description: FK to DiskGroup (ON DELETE SET NULL)
          example: 1
        thresholdPct:
          type: ["number", "null"]
          format: double
          description: Override disk group threshold; null = inherit
          example: 90.0
        targetPct:
          type: ["number", "null"]
          format: double
          description: Override disk group target; null = inherit
          example: 80.0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name]

    LibraryCreate:
      type: object
      properties:
        name:
          type: string
          example: "Movies"
        diskGroupId:
          type: ["integer", "null"]
        thresholdPct:
          type: ["number", "null"]
          format: double
        targetPct:
          type: ["number", "null"]
          format: double
      required: [name]

    # ---- Scoring Factor Weight ----
    ScoringFactorWeight:
      type: object
      properties:
        key:
          type: string
          description: Unique factor key from the engine's factor registry
          example: "watch_history"
        name:
          type: string
          description: Human-readable factor name
          example: "Watch History"
        description:
          type: string
          description: Factor description
          example: "Number of times the media has been watched"
        weight:
          type: integer
          minimum: 0
          maximum: 10
          description: Current weight (0–10 scale)
          example: 10
        defaultWeight:
          type: integer
          minimum: 0
          maximum: 10
          description: Default weight from the engine
          example: 10
      required: [key, name, weight, defaultWeight]

    # ---- Integration ----
    IntegrationConfig:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          enum: [plex, sonarr, radarr, lidarr, readarr, tautulli, seerr, jellyfin, emby]
          example: sonarr
        name:
          type: string
          example: "Sonarr (TV)"
        url:
          type: string
          format: uri
          example: "http://sonarr:8989"
        apiKey:
          type: string
          description: Masked API key (first 4 + last 4 characters)
          example: "abcd...wxyz"
        enabled:
          type: boolean
          example: true
        libraryId:
          type: ["integer", "null"]
          description: FK to Library (ON DELETE SET NULL)
          example: 1
        collectionDeletion:
          type: boolean
          description: When enabled, deleting one collection member deletes all
          default: false
          example: false
        mediaSizeBytes:
          type: integer
          format: int64
          example: 549755813888
        mediaCount:
          type: integer
          example: 150
        lastSync:
          type: ["string", "null"]
          format: date-time
        lastError:
          type: string
          example: ""
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, type, name, url, apiKey, enabled]

    IntegrationConfigCreate:
      type: object
      properties:
        type:
          type: string
          enum: [plex, sonarr, radarr, lidarr, readarr, tautulli, seerr, jellyfin, emby]
        name:
          type: string
        url:
          type: string
          format: uri
          description: Must use HTTP or HTTPS scheme
        apiKey:
          type: string
          description: Plaintext API key or token for the service
      required: [type, name, url, apiKey]

    IntegrationConfigUpdate:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        apiKey:
          type: string
          description: New API key, or masked value to keep existing
        enabled:
          type: boolean

    ConnectionTestRequest:
      type: object
      properties:
        type:
          type: string
          enum: [plex, sonarr, radarr, lidarr, readarr, tautulli, seerr, jellyfin, emby]
        url:
          type: string
          format: uri
        apiKey:
          type: string
        integrationId:
          type: ["integer", "null"]
          description: Optional — invalidates rule value cache for this integration on success
      required: [type, url, apiKey]

    ConnectionTestResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          description: Present on success
        error:
          type: string
          description: Present on failure
      required: [success]
      example:
        success: true
        message: "Connection successful"

    SyncResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [ok, error]
        error:
          type: string
          description: Present if status is error
        diskError:
          type: string
        diskSpace:
          type: array
          items:
            $ref: "#/components/schemas/DiskSpace"
        mediaError:
          type: string
        mediaCount:
          type: integer
      required: [id, name, type, status]

    DiskSpace:
      type: object
      properties:
        path:
          type: string
          example: "/media"
        totalBytes:
          type: integer
          format: int64
        freeBytes:
          type: integer
          format: int64
      required: [path, totalBytes, freeBytes]

    # ---- Preferences ----
    PreferenceSet:
      type: object
      properties:
        id:
          type: integer
          example: 1
        logLevel:
          type: string
          enum: [debug, info, warn, error]
          default: info
        auditLogRetentionDays:
          type: integer
          description: Days to retain audit logs (0 = forever)
          default: 30
          example: 30
        pollIntervalSeconds:
          type: integer
          description: Polling interval in seconds (minimum 60, default 300)
          minimum: 60
          default: 300
          example: 300
        executionMode:
          type: string
          enum: [dry-run, approval, auto]
          default: dry-run
        tiebreakerMethod:
          type: string
          enum: [size_desc, size_asc, name_asc, oldest_first, newest_first]
          default: size_desc
        deletionsEnabled:
          type: boolean
          description: Whether actual deletion execution is enabled
          example: false
        snoozeDurationHours:
          type: integer
          description: Hours to snooze rejected items before re-evaluation
          default: 24
          example: 24
        checkForUpdates:
          type: boolean
          description: Enable outbound update checks
          default: true
        deletionQueueDelaySeconds:
          type: integer
          description: Grace period before processing queued deletions (10-300)
          minimum: 10
          maximum: 300
          default: 30
          example: 30
        deadContentMinDays:
          type: integer
          description: Minimum days in library for dead content report
          default: 90
          example: 90
        staleContentDays:
          type: integer
          description: Days since last watch for stale content report
          default: 180
          example: 180
        updatedAt:
          type: string
          format: date-time
      required:
        - logLevel
        - executionMode
        - tiebreakerMethod

    # ---- Rules ----
    CustomRule:
      type: object
      properties:
        id:
          type: integer
          example: 1
        integrationId:
          type: ["integer", "null"]
          description: FK to IntegrationConfig; required — every rule belongs to an integration
        field:
          type: string
          description: "The field to match (e.g., quality, tag, rating, genre)"
          example: quality
        operator:
          type: string
          description: "Comparison operator (e.g., ==, !=, contains, >, <)"
          example: "=="
        value:
          type: string
          description: "Value to compare against"
          example: "4K"
        effect:
          type: string
          enum: [always_keep, prefer_keep, lean_keep, lean_remove, prefer_remove, always_remove]
          example: always_keep
        type:
          type: string
          description: "Deprecated: legacy rule type"
          deprecated: true
        intensity:
          type: string
          description: "Deprecated: legacy rule intensity"
          deprecated: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, field, operator, value, effect]

    CustomRuleCreate:
      type: object
      properties:
        integrationId:
          type: ["integer", "null"]
        field:
          type: string
          example: genre
        operator:
          type: string
          example: contains
        value:
          type: string
          example: "Anime"
        effect:
          type: string
          enum: [always_keep, prefer_keep, lean_keep, lean_remove, prefer_remove, always_remove]
          description: |
            Required unless both `type` and `intensity` are provided (legacy
            format). The effect determines how strongly the rule influences
            scoring.
        type:
          type: string
          description: "Deprecated: use `effect` instead. Legacy values: protect, target"
          deprecated: true
        intensity:
          type: string
          description: "Deprecated: use `effect` instead. Legacy values: absolute, strong, moderate"
          deprecated: true
      required: [field, operator, value]

    SettingsExportEnvelope:
      type: object
      description: Portable settings export containing selected sections
      properties:
        version:
          type: integer
          description: Schema version for forward compatibility
          example: 1
        exportedAt:
          type: string
          format: date-time
          description: UTC timestamp when the export was generated
        appVersion:
          type: string
          description: Capacitarr version that created the export
          example: "1.2.0"
        preferences:
          type: object
          description: Scoring weights, execution mode, tiebreaker (if included)
        rules:
          type: array
          description: Custom protection rules (if included)
          items:
            $ref: "#/components/schemas/PortableRule"
        integrations:
          type: array
          description: Integration configs without API keys (if included)
          items:
            type: object
        diskGroups:
          type: array
          description: Disk group thresholds (if included)
          items:
            type: object
        notificationChannels:
          type: array
          description: Notification channels without webhook URLs (if included)
          items:
            type: object
      required: [version, exportedAt, appVersion]

    PortableRule:
      type: object
      description: |
        A custom rule in portable format with integration name/type
        instead of numeric IDs for cross-instance compatibility.
      properties:
        field:
          type: string
          example: genre
        operator:
          type: string
          example: contains
        value:
          type: string
          example: Anime
        effect:
          type: string
          enum: [always_keep, prefer_keep, lean_keep, lean_remove, prefer_remove, always_remove]
          example: always_keep
        enabled:
          type: boolean
          default: true
        integrationName:
          type: ["string", "null"]
          description: Human-readable integration name
          example: Main
        integrationType:
          type: ["string", "null"]
          description: Integration type (sonarr, radarr, lidarr, readarr)
          example: sonarr
      required: [field, operator, value, effect, enabled]

    SettingsImportRequest:
      type: object
      properties:
        envelope:
          $ref: "#/components/schemas/SettingsExportEnvelope"
        sections:
          type: object
          description: Which sections to import (all default to false)
          properties:
            preferences:
              type: boolean
            rules:
              type: boolean
            integrations:
              type: boolean
            diskGroups:
              type: boolean
            notifications:
              type: boolean
            mode:
              type: string
              description: |
                Import mode. "merge" (default) upserts matching items and
                leaves unmatched items. "sync" also deletes existing items
                not in the import file. Legacy values "append" and "replace"
                are accepted for backward compatibility.
              enum: [merge, sync]
              default: merge
      required: [envelope]

    SettingsImportResponse:
      type: object
      properties:
        preferencesImported:
          type: boolean
          description: Whether preferences were imported
        rulesImported:
          type: integer
          description: Number of rules imported
          example: 5
        rulesUnmatched:
          type: integer
          description: Number of rules that could not be matched to an integration
          example: 0
        integrationsImported:
          type: integer
          description: Number of integrations imported
          example: 2
        diskGroupsImported:
          type: integer
          description: Number of disk groups imported
          example: 1
        notificationChannelsImported:
          type: integer
          description: Number of notification channels imported
          example: 1
        itemsDeleted:
          type: integer
          description: Number of existing items deleted during sync mode
          example: 0
        preImportSnapshot:
          $ref: "#/components/schemas/SettingsExportEnvelope"
          description: |
            Snapshot of the affected sections before the import was applied.
            Only included in sync mode. Can be used to restore previous state.

    RuleField:
      type: object
      properties:
        field:
          type: string
          example: quality
        label:
          type: string
          example: "Quality Profile"
        type:
          type: string
          enum: [string, number, boolean]
        operators:
          type: array
          items:
            type: string
          example: ["==", "!="]
      required: [field, label, type, operators]

    RuleValueResult:
      type: object
      description: |
        Polymorphic response — shape depends on the field type:
        - **closed**: `{ type: "closed", options: NameValue[] }`
        - **combobox**: `{ type: "combobox", suggestions: NameValue[] }`
        - **free**: `{ type: "free", inputType: string, placeholder: string, suffix: string }`
      properties:
        type:
          type: string
          enum: [closed, combobox, free]
        options:
          type: array
          items:
            $ref: "#/components/schemas/NameValue"
          description: Present when type is "closed"
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/NameValue"
          description: Present when type is "combobox"
        inputType:
          type: string
          description: Present when type is "free" (e.g., "text", "number")
        placeholder:
          type: string
          description: Present when type is "free"
        suffix:
          type: string
          description: Present when type is "free" (e.g., "days", "bytes")
      required: [type]

    NameValue:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
      required: [value, label]
      example:
        value: "4K"
        label: "4K"

    # ---- Media / Scoring ----
    MediaItem:
      type: object
      properties:
        externalId:
          type: string
          description: ID from the source service
          example: "42"
        integrationId:
          type: integer
          description: FK to IntegrationConfig
          example: 1
        type:
          type: string
          enum: [movie, show, season, episode, artist, book]
          example: movie
        title:
          type: string
          example: "The Shawshank Redemption"
        year:
          type: integer
          example: 1994
        sizeBytes:
          type: integer
          format: int64
          example: 5368709120
        path:
          type: string
          example: "/media/movies/The Shawshank Redemption (1994)"
        seasonNumber:
          type: integer
          description: TV-specific
        episodeCount:
          type: integer
          description: TV-specific
        showTitle:
          type: string
          description: TV-specific — parent show title
        seriesStatus:
          type: string
          description: "TV-specific — e.g., continuing, ended"
        qualityProfile:
          type: string
          example: "HD-1080p"
        rating:
          type: number
          format: double
          example: 9.3
        genre:
          type: string
          example: "Drama"
        monitored:
          type: boolean
        playCount:
          type: integer
          description: Watch data from Plex/Tautulli/media servers
        lastPlayed:
          type: ["string", "null"]
          format: date-time
          description: Last play date from watch history
        addedAt:
          type: ["string", "null"]
          format: date-time
          description: Date when item was added to the library
        tags:
          type: array
          items:
            type: string
          example: ["anime", "4k"]
        isRequested:
          type: boolean
          description: Whether this item was user-requested (Seerr)
        requestedBy:
          type: string
          description: Who requested the item (Seerr)
        requestCount:
          type: integer
          description: Number of requests (Seerr)
        tmdbId:
          type: integer
          description: TMDb ID for cross-referencing
        language:
          type: string
          description: Original language
          example: "English"
      required: [externalId, integrationId, type, title, sizeBytes, path, monitored]

    ScoreFactor:
      type: object
      properties:
        name:
          type: string
          description: "Factor name (e.g., Watch History, File Size, Rule: ...)"
          example: "Watch History"
        rawScore:
          type: number
          format: double
          description: Raw score before weighting (0.0–1.0)
          example: 0.85
        weight:
          type: integer
          description: Weight applied (0–10)
          example: 10
        contribution:
          type: number
          format: double
          description: Normalized contribution to the final score
          example: 0.34
        type:
          type: string
          enum: [weight, rule]
          description: Whether this factor comes from a weight or a rule
      required: [name, rawScore, weight, contribution, type]

    EvaluatedItem:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/MediaItem"
        score:
          type: number
          format: double
          description: Final deletion score (higher = more likely to be deleted)
          example: 0.72
        isProtected:
          type: boolean
          description: Whether the item is protected by an `always_keep` rule
        reason:
          type: string
          description: Human-readable reason for the score or protection
          example: "Rule: quality == 4K → always_keep"
        factors:
          type: array
          items:
            $ref: "#/components/schemas/ScoreFactor"
      required: [item, score, isProtected, reason, factors]

    DiskContext:
      type: object
      description: Disk usage context for the most relevant disk group
      properties:
        totalBytes:
          type: integer
          format: int64
          example: 1099511627776
        usedBytes:
          type: integer
          format: int64
          example: 934361657140
        targetPct:
          type: number
          format: double
          example: 75.0
        thresholdPct:
          type: number
          format: double
          example: 85.0
        bytesToFree:
          type: integer
          format: int64
          description: Bytes that need to be freed to reach target (0 if below threshold)
          example: 109951162777
      required: [totalBytes, usedBytes, targetPct, thresholdPct, bytesToFree]

    PreviewResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EvaluatedItem"
        diskContext:
          oneOf:
            - $ref: "#/components/schemas/DiskContext"
            - type: "null"
          description: Disk context for the most relevant disk group, or null if no disk groups exist
      required: [items, diskContext]

    # ---- Metrics History ----
    LibraryHistory:
      type: object
      description: |
        Historical capacity snapshot. Note: field names use Go's default
        capitalized JSON serialization (no json tags on this struct).
      properties:
        ID:
          type: integer
        Timestamp:
          type: string
          format: date-time
        TotalCapacity:
          type: integer
          format: int64
        UsedCapacity:
          type: integer
          format: int64
        Resolution:
          type: string
          enum: [raw, hourly, daily, weekly]
        DiskGroupID:
          type: ["integer", "null"]
          description: Optional FK to DiskGroup
        CreatedAt:
          type: string
          format: date-time
      required: [ID, Timestamp, TotalCapacity, UsedCapacity, Resolution]

    MetricsHistoryResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: array
          items:
            $ref: "#/components/schemas/LibraryHistory"
      required: [status, data]

    # ---- Worker Stats ----
    WorkerStats:
      type: object
      properties:
        executionMode:
          type: string
          enum: [dry-run, approval, auto]
          example: dry-run
        isRunning:
          type: boolean
          description: Whether the poller is currently executing
        pollIntervalSeconds:
          type: integer
          example: 300
        queueDepth:
          type: integer
          description: Number of items in the deletion queue
        lastRunEvaluated:
          type: integer
          format: int64
          description: Items evaluated in the last (or current) run
        lastRunFlagged:
          type: integer
          format: int64
          description: Items flagged for deletion in the last (or current) run
        lastRunFreedBytes:
          type: integer
          format: int64
          description: Bytes freed in the last (or current) run
        lastRunEpoch:
          type: integer
          format: int64
          description: Unix timestamp of the last run completion (falls back to start time for legacy data)
        currentlyDeleting:
          type: string
          description: Title of the item currently being deleted (empty if idle)
        protectedCount:
          type: integer
          format: int64
          description: Number of protected items in the last run
        evaluated:
          type: integer
          format: int64
          description: Cumulative total items evaluated across all runs
        actioned:
          type: integer
          format: int64
          description: Cumulative total items actioned (flagged/deleted) across all runs
        freedBytes:
          type: integer
          format: int64
          description: Cumulative total bytes freed across all runs
        processed:
          type: integer
          format: int64
          description: Total items processed by the deletion worker
        failed:
          type: integer
          format: int64
          description: Total items that failed during deletion
      required:
        - executionMode
        - isRunning
        - pollIntervalSeconds
        - queueDepth
        - lastRunEvaluated
        - lastRunFlagged
        - lastRunFreedBytes
        - lastRunEpoch
        - currentlyDeleting
        - protectedCount
        - evaluated
        - actioned
        - freedBytes
        - processed
        - failed

    # ---- Dashboard Stats ----
    DashboardStats:
      type: object
      properties:
        totalBytesReclaimed:
          type: integer
          format: int64
          description: Lifetime total bytes reclaimed
          example: 549755813888
        totalItemsRemoved:
          type: integer
          description: Lifetime total items removed
          example: 42
        totalEngineRuns:
          type: integer
          description: Lifetime total engine evaluation cycles
          example: 150
        protectedCount:
          type: integer
          format: int64
          description: Current number of protected items (from worker metrics)
          example: 12
        growthBytesPerWeek:
          type: integer
          format: int64
          description: Library growth rate in bytes over the last 7 days
          example: 10737418240
        hasGrowthData:
          type: boolean
          description: Whether growth data is available (need at least 7 days of history)
      required:
        - totalBytesReclaimed
        - totalItemsRemoved
        - totalEngineRuns
        - protectedCount
        - growthBytesPerWeek
        - hasGrowthData

    # ---- Lifetime Stats ----
    LifetimeStats:
      type: object
      properties:
        id:
          type: integer
          example: 1
        totalBytesReclaimed:
          type: integer
          format: int64
          example: 549755813888
        totalItemsRemoved:
          type: integer
          example: 42
        totalEngineRuns:
          type: integer
          example: 150
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
      required: [id, totalBytesReclaimed, totalItemsRemoved, totalEngineRuns]

    # ---- Audit ----
    AuditLogEntry:
      type: object
      description: A permanent record of a deletion or dry-run action (append-only)
      properties:
        id:
          type: integer
          example: 1
        mediaName:
          type: string
          example: "Breaking Bad - Season 1"
        mediaType:
          type: string
          example: season
        reason:
          type: string
          description: Human-readable score summary
          example: "Score: 0.85 (WatchHistory: 1.0, Size: 0.5)"
        scoreDetails:
          type: string
          description: JSON-encoded array of ScoreFactor objects
          example: '[{"name":"Watch History","rawScore":1.0,"weight":10,"contribution":0.4,"type":"weight"}]'
        action:
          type: string
          enum: [deleted, dry_run, dry_delete]
          example: deleted
        sizeBytes:
          type: integer
          format: int64
          example: 5368709120
        integrationId:
          type: integer
          nullable: true
          description: FK to integration (nullable — preserved when integration is deleted)
          example: 1
        createdAt:
          type: string
          format: date-time
      required: [id, mediaName, mediaType, reason, action, sizeBytes, createdAt]

    AuditLogResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer
          description: Total number of records matching the filter
          example: 150
        limit:
          type: integer
          example: 50
        offset:
          type: integer
          example: 0
      required: [data, total, limit, offset]

    ApprovalQueueItem:
      type: object
      description: An item in the approval queue (state machine — pending/approved/rejected)
      properties:
        id:
          type: integer
          example: 1
        mediaName:
          type: string
          example: "Breaking Bad - Season 1"
        mediaType:
          type: string
          enum: [movie, show, season, episode, artist, album, book]
          example: season
        reason:
          type: string
          description: Human-readable score summary
          example: "Score: 0.85 (WatchHistory: 1.0, Size: 0.5)"
        scoreDetails:
          type: string
          description: JSON-encoded array of ScoreFactor objects
        sizeBytes:
          type: integer
          format: int64
          example: 5368709120
        integrationId:
          type: integer
          description: FK to integration (required)
          example: 1
        externalId:
          type: string
          description: External ID in the source integration
          example: "12345"
        status:
          type: string
          enum: [pending, approved, rejected]
          example: pending
        snoozedUntil:
          type: string
          format: date-time
          nullable: true
          description: When snooze expires (rejected items only)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, mediaName, mediaType, reason, sizeBytes, integrationId, status, createdAt, updatedAt]

    EngineHistoryPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: When the engine run occurred
          example: "2026-03-01T14:00:00Z"
        evaluated:
          type: integer
          description: Number of media items evaluated
          example: 120
        flagged:
          type: integer
          description: Number of items flagged for deletion
          example: 8
        deleted:
          type: integer
          description: Number of items actually deleted
          example: 5
        freedBytes:
          type: integer
          format: int64
          description: Total bytes freed by deletions
          example: 2000000000
        durationMs:
          type: integer
          format: int64
          description: Engine run duration in milliseconds
          example: 320
      required: [timestamp, evaluated, flagged, deleted, freedBytes, durationMs]

    GroupedAuditResult:
      type: object
      properties:
        type:
          type: string
          enum: [group, single]
          description: Whether this is a grouped TV entry or a standalone item
        group:
          $ref: "#/components/schemas/AuditGroup"
        entry:
          $ref: "#/components/schemas/AuditLogEntry"

    AuditGroup:
      type: object
      description: A group of audit log entries belonging to the same TV show
      properties:
        showTitle:
          type: string
          example: "Breaking Bad"
        children:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        totalSize:
          type: integer
          format: int64
          description: Combined size of all children
        action:
          type: string
          description: Action of the first child (representative)
        createdAt:
          type: string
          format: date-time
          description: Timestamp of the first child (representative)
      required: [showTitle, children, totalSize, action, createdAt]

    # ---- Data Reset ----
    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ActivityEvent:
      type: object
      properties:
        id:
          type: integer
        eventType:
          type: string
          description: Machine-readable event type
        message:
          type: string
          description: Human-readable event description
        metadata:
          type: string
          description: Optional JSON metadata
        createdAt:
          type: string
          format: date-time

    NotificationChannel:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [discord, apprise]
        name:
          type: string
        webhookUrl:
          type: string
        appriseTags:
          type: string
          description: Comma-separated Apprise tags for routing (Apprise channels only)
        enabled:
          type: boolean
        onCycleDigest:
          type: boolean
        onError:
          type: boolean
        onModeChanged:
          type: boolean
        onServerStarted:
          type: boolean
        onThresholdBreach:
          type: boolean
        onUpdateAvailable:
          type: boolean
        onApprovalActivity:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NotificationChannelInput:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [discord, apprise]
        name:
          type: string
        webhookUrl:
          type: string
        appriseTags:
          type: string
          description: Comma-separated Apprise tags for routing (optional, Apprise channels only)
        enabled:
          type: boolean
        onCycleDigest:
          type: boolean
        onError:
          type: boolean
        onModeChanged:
          type: boolean
        onServerStarted:
          type: boolean
        onThresholdBreach:
          type: boolean
        onUpdateAvailable:
          type: boolean
        onApprovalActivity:
          type: boolean

    VersionCheckResult:
      type: object
      properties:
        current:
          type: string
          description: Current application version
        latest:
          type: string
          description: Latest available version
        updateAvailable:
          type: boolean
        releaseUrl:
          type: string
          description: URL to the release page
        checkedAt:
          type: string
          format: date-time

    DataResetResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: "All scraped data has been cleared"
        cleared:
          type: object
          description: Count of records cleared per table
          properties:
            auditLogs:
              type: integer
              format: int64
            libraryHistories:
              type: integer
              format: int64
            engineRunStats:
              type: integer
              format: int64
            diskGroups:
              type: integer
              format: int64
            integrationsReset:
              type: integer
              format: int64
      required: [status, message, cleared]
