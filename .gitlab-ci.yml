# Capacitarr GitLab CI/CD Pipeline
#
# Single pipeline for all events:
#   lint → test → build → security → [release] → pages
#
# The release stage only runs when a tag is pushed.
# The workflow:rules prevent duplicate pipelines when pushing a tag
# (only the tag pipeline runs, not a separate branch pipeline).

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # Tag push → run the full pipeline including release stage
    - if: $CI_COMMIT_TAG
    # MR pipelines
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Branch pushes (but not if a tag was also pushed — handled above)
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - test
  - build
  - security
  - release
  - notify
  - pages

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:go:
  stage: lint
  image: golangci/golangci-lint:latest
  interruptible: true
  before_script:
    # Create placeholder for go:embed directive (frontend isn't built during lint)
    - mkdir -p backend/frontend/dist && touch backend/frontend/dist/.gitkeep
  script:
    - cd backend && golangci-lint run ./...

lint:frontend:
  stage: lint
  image: node:22-alpine
  interruptible: true
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - pnpm lint
    - pnpm format:check
    - pnpm typecheck

# ── Test ──────────────────────────────────────────────────────────────────────

test:go:
  stage: test
  image: golang:1.26-alpine
  interruptible: true
  before_script:
    # Create placeholder for go:embed directive (frontend isn't built during test)
    - mkdir -p backend/frontend/dist && touch backend/frontend/dist/.gitkeep
  script:
    - cd backend && go test -v ./... -count=1

test:frontend:
  stage: test
  image: node:22-alpine
  interruptible: true
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - pnpm test

# ── Build ─────────────────────────────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:latest
  interruptible: true
  services:
    - docker:dind
  before_script:
    - docker buildx create --use --driver docker-container
  script:
    - docker buildx build --platform linux/amd64,linux/arm64 --provenance=false --output=type=cacheonly .

# ── Security ──────────────────────────────────────────────────────────────────

security:govulncheck:
  stage: security
  image: golang:1.26-alpine
  interruptible: true
  before_script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    # Create placeholder for go:embed directive (frontend isn't built during security scan)
    - mkdir -p backend/frontend/dist && touch backend/frontend/dist/.gitkeep
  script:
    - cd backend && govulncheck ./...

security:pnpm-audit:
  stage: security
  image: node:22-alpine
  interruptible: true
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - pnpm audit

security:trivy:
  stage: security
  image:
    name: ghcr.io/aquasecurity/trivy:latest
    entrypoint: [""]
  interruptible: true
  script:
    # Filesystem scan — checks Go modules + pnpm dependencies for known CVEs
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL --scanners vuln backend/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL --scanners vuln frontend/

security:trivy-image:
  stage: security
  image: docker:latest
  interruptible: true
  services:
    - docker:dind
  script:
    # Build image for current platform only (not multi-arch) and scan it.
    # Checks Alpine OS packages + Go binary for known CVEs.
    - docker build -t capacitarr:ci-scan .
    - |
      apk add --no-cache curl
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      trivy image --exit-code 1 --severity HIGH,CRITICAL --scanners vuln capacitarr:ci-scan

security:gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  interruptible: true
  variables:
    GIT_DEPTH: 0
  script:
    - gitleaks detect --source . --config .gitleaks.toml --verbose

security:semgrep:
  stage: security
  image:
    name: semgrep/semgrep:latest
    entrypoint: [""]
  interruptible: true
  script:
    - semgrep scan --config=auto --error .

# ── Release (tag-triggered, gated behind lint/test/build) ────────────────────

# Extract release notes from the committed CHANGELOG.md for the tagged version
changelog:
  stage: release
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  before_script:
    # git-cliff image is Debian-based and does not include git
    - apt-get update -qq && apt-get install -y -qq git
  script:
    - git cliff --latest --strip header > release_notes.md
    - cat release_notes.md
  artifacts:
    paths:
      - release_notes.md
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Build cross-compiled binaries and create GitLab release with asset uploads
release:goreleaser:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  needs:
    - job: changelog
      artifacts: true
  variables:
    GIT_DEPTH: 0
  before_script:
    # GoReleaser image (Alpine) already has git; add Node.js + pnpm for frontend build hook
    - apk add --no-cache nodejs npm
    - npm install -g corepack
    - corepack enable && corepack prepare pnpm@10.29.3 --activate
  script:
    - cat release_notes.md
    - goreleaser release --clean --release-notes release_notes.md
  rules:
    - if: $CI_COMMIT_TAG

# Build and push multi-arch Docker images to GitLab Container Registry
release:docker:build:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker buildx create --use --driver docker-container
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - scripts/docker-build.sh
  rules:
    - if: $CI_COMMIT_TAG

# Mirror to Docker Hub (fault-isolated, runs after GitLab push succeeds)
# Uses alpine + crane binary download because the official crane image is
# distroless (no shell) which prevents GitLab CI from executing scripts.
release:docker:dockerhub:
  stage: release
  image: alpine:latest
  needs:
    - job: release:docker:build
  before_script:
    - apk add --no-cache curl
    - curl -sSL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" | tar xzf - -C /usr/local/bin/ crane
    - crane auth login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - crane auth login docker.io -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
  script:
    - scripts/docker-mirror.sh "docker.io/ghentstarshadow/capacitarr"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG

# Mirror to GHCR (fault-isolated, runs after GitLab push succeeds)
release:docker:ghcr:
  stage: release
  image: alpine:latest
  needs:
    - job: release:docker:build
  before_script:
    - apk add --no-cache curl
    - curl -sSL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" | tar xzf - -C /usr/local/bin/ crane
    - crane auth login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - crane auth login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_TOKEN"
  script:
    - scripts/docker-mirror.sh "ghcr.io/ghent/capacitarr"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG

# ── Notify (tag-triggered, runs after all release jobs succeed) ───────────────

notify:discord:
  stage: notify
  image: alpine:latest
  needs:
    - job: changelog
      artifacts: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - scripts/discord-release-notify.sh
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG

# ── Pages ─────────────────────────────────────────────────────────────────────

pages:
  stage: pages
  image: node:22-alpine
  interruptible: true
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"
  before_script:
    - corepack enable
    - cd site && pnpm install --frozen-lockfile
  script:
    # Sync docs, screenshots, and changelog (already in site/ from before_script cd)
    - node scripts/sync-docs.mjs
    # Copy favicon
    - cp ../frontend/public/favicon.ico public/favicon.ico 2>/dev/null || true
    # Build static site (SITE_BASE_URL defaults to '/' for capacitarr.app)
    - pnpm generate
    - mv .output/public/ ../public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
