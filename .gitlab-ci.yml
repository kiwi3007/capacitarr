# Capacitarr GitLab CI/CD Pipeline
# Runs lint, test, build, and security stages on every push and merge request.

stages:
  - lint
  - test
  - build
  - security
  - release
  - pages

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:go:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - cd backend && golangci-lint run ./...

lint:frontend:
  stage: lint
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm lint

# ── Test ──────────────────────────────────────────────────────────────────────

test:go:
  stage: test
  image: golang:1.25-alpine
  script:
    - cd backend && go test ./... -race -count=1

test:frontend:
  stage: test
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm test

# ── Build ─────────────────────────────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker buildx create --use --driver docker-container
  script:
    - docker buildx build --platform linux/amd64,linux/arm64 .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Security ──────────────────────────────────────────────────────────────────

security:govulncheck:
  stage: security
  image: golang:1.25-alpine
  before_script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - cd backend && govulncheck ./...
  allow_failure: true

security:pnpm-audit:
  stage: security
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm audit
  allow_failure: true

# ── Release ───────────────────────────────────────────────────────────────────

changelog:
  stage: release
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  script:
    - git cliff --latest --strip header > release_notes.md
    - cat release_notes.md
  artifacts:
    paths:
      - release_notes.md
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script:
    - apk add --no-cache git curl jq npm
    - pip3 install --break-system-packages git-cliff || apk add --no-cache py3-pip && pip3 install --break-system-packages git-cliff
  script:
    - |
      # Determine the next semantic version from conventional commits
      VERSION=$(git cliff --bumped-version 2>/dev/null || echo "")
      if [ -z "$VERSION" ]; then
        echo "No version bump needed — no conventional commits found."
        exit 0
      fi

      # Check if this version tag already exists
      CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
      if [ "$VERSION" = "$CURRENT_TAG" ]; then
        echo "Version $VERSION already tagged — skipping release."
        exit 0
      fi

      echo "Bumping to version: $VERSION"

      # Generate changelog body for the release
      git cliff --unreleased --strip header > changelog_body.md
      cat changelog_body.md

      # Update version in package.json files
      SEMVER=$(echo "$VERSION" | sed 's/^v//')
      if [ -f package.json ]; then
        jq --arg v "$SEMVER" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
      fi
      if [ -f frontend/package.json ]; then
        jq --arg v "$SEMVER" '.version = $v' frontend/package.json > frontend/package.json.tmp && mv frontend/package.json.tmp frontend/package.json
      fi

      # Update the full CHANGELOG.md
      git cliff --bump -o CHANGELOG.md

      # Export variables for the release step
      echo "VERSION=$VERSION" >> release.env
      echo "CHANGELOG<<EOF" >> release.env
      cat changelog_body.md >> release.env
      echo "EOF" >> release.env
    - cat release.env
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - CHANGELOG.md
      - package.json
      - frontend/package.json
    expire_in: 1 week
  release:
    tag_name: $VERSION
    description: $CHANGELOG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
      when: never

# ── Pages ─────────────────────────────────────────────────────────────────────

pages:
  stage: pages
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd site && pnpm install --frozen-lockfile
  script:
    - cd site
    # Sync docs, screenshots, and changelog
    - node scripts/sync-docs.mjs
    # Copy favicon
    - cp ../frontend/public/favicon.ico public/favicon.ico 2>/dev/null || true
    # Build static site (SITE_BASE_URL defaults to '/' for capacitarr.app)
    - pnpm generate
    - mv .output/public/ ../public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
