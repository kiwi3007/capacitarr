version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - misspell
    - unparam
    - unused
    - gosec
    - gocritic
    - revive
    - nilerr
    - bodyclose
    - goconst
    - prealloc
    - exhaustive
    - noctx
  settings:
    goconst:
      min-occurrences: 5
    gosec:
      excludes:
        - G117
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - errcheck
          - goconst

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
